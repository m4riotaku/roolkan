<style>
    :host {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    * {
        font-family: "Open Sans", sans-serif;
        font-optical-sizing: auto;
        font-style: normal;
        font-variation-settings: "wdth" 100;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .login_form {
        width: 420px;
        background: transparent;
        border: 2px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(20px);
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        color: #ffffff;
        border-radius: 10px;
        padding: 30px 40px;
    }

    .login_form h2 {
        font-size: 36px;
        text-align: center;
    }
    .login_form .input_box {
        position: relative;
        width: 100%;
        margin: 30px 0;
    }

    .input_box input {
        width: 100%;
        height: 100%;
        background: transparent;
        border: none;
        outline: none;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 40px;
        font-size: 16px;
        color: #fff;
        padding: 20px 45px 20px 20px;
    }
    .input_box input::placeholder {
        color: #fff;
    }
    img {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        width: 25px;
    }

    .btn {
        width: 100%;
        height: 45px;
        border: none;
        outline: none;
        background-color: #fff;
        border-radius: 40px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        cursor: pointer;
        font-size: 16px;
        color: #333;
        font-weight: 600;
    }
    .register_link {
        font-size: 14.5px;
        text-align: center;
        margin: 20px 0 15px;
    }

    .register_link p a {
        color: #fff;
        text-decoration: none;
        font-weight: 600;
    }
    .register_link p a:hover {
        text-decoration: underline;
    }
    @media (max-width: 768px) {
        .login_form {
            width: 350px;
        }
    }
    @media (max-width: 450px) {
        .login_form {
            width: 300px;
            padding: 0 20px;
        }
    }
    @media (max-width: 350px) {
        .login_form {
            width: 250px;
        }
        .login_form h2 {
            font-size: 26px;
        }
        .input_box input {
            padding: 10px 35px 10px 20px;
        }
        .input_box {
            margin: 20px 0;
        }
        .btn {
            height: 35px;
        }
    }
</style>
<form id="login_form" class="login_form">
    <h2>Login</h2>
    <div class="input_box">
        <input id="user_name" type="text" placeholder="UserName" required />
        <img src="/assets/account.svg" />
    </div>
    <div class="input_box">
        <input id="password" type="password" placeholder="Password" required />
        <img src="/assets/lock.svg" />
    </div>
    <button type="submit" class="btn">Login</button>
    <div class="register_link">
        <p>
            ¿No tienes una cuanta?
            <!--<a is="custom-link" href="/register">Register</a>-->
            <a
                onClick="alert('No es necesario registrarse todavía, escriba un nombre de usuario y contraseña de su preferencia y haga click en login, los datos no se validarán y solo se guardarán de forma local para simular una cuenta normal')"
            >
                Register
            </a>
        </p>
    </div>
</form>
